<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Newpad</title><style>
:root{--bg:#121212;--pn:#1e1e1e;--tx:#e0e0e0;--bd:#333;--ac:#2a2a2a}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;height:100dvh;overflow:hidden;position:fixed;width:100%;top:0;left:0}
body{background:var(--bg);color:var(--tx);font-family:sans-serif;display:grid;grid-template-rows:28px 52px 1fr}
.status-bar{background:#181818;padding:0 14px;font-size:12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:16px;color:#888;height:28px;user-select:none}
.toolbar{background:var(--pn);padding:4px;display:flex;align-items:center;gap:4px;border-bottom:1px solid var(--bd);height:52px}
.toolbar-group{display:flex;align-items:center;height:100%;background:var(--ac);border:1px solid var(--bd);border-radius:6px;overflow:hidden;flex:1;min-width:0}
.g-single{max-width:85px}.g-multi{max-width:165px}
.btn-main{background:0 0;color:var(--tx);border:none;height:100%;flex:1;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;min-width:0}
.btn-main:active{background:#444}.group-divider{border-left:1px solid var(--bd);height:100%}
.group-label{font-size:11px;color:#888;padding:0 4px;text-transform:uppercase;background:#222;height:100%;display:flex;align-items:center;user-select:none}
.menu-container{position:relative;height:100%;margin-left:auto;flex-shrink:0}
.btn-menu{background:var(--ac);color:var(--tx);border:1px solid var(--bd);height:100%;width:42px;display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:6px;cursor:pointer}
.dropdown-menu{display:none;position:absolute;top:48px;right:0;background:#1a1a1a;border:1px solid var(--bd);border-radius:6px;min-width:180px;z-index:99999;padding:4px 0;box-shadow:0 6px 16px rgba(0,0,0,.6)}
.dropdown-menu.show{display:block!important}
.menu-item{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:15px;border-bottom:1px solid #252525;color:var(--tx);user-select:none}
.menu-item:last-child{border-bottom:none}
.container{width:100%;height:100%;overflow:hidden;position:relative}
textarea{width:100%;height:100%;background:var(--bg);color:var(--tx);border:none;padding:14px;resize:none;outline:0;font-size:16px;line-height:1.5;overflow-y:auto;overscroll-behavior:contain}
.word-wrap{white-space:pre-wrap;word-break:break-word}.no-wrap{white-space:pre;word-break:normal;overflow-x:auto}.monospace{font-family:monospace!important}
#p-O,#p-U{display:none}
@media(min-width:480px){#p-O{display:inline-flex}#m-O{display:none}}
@media(min-width:640px){#p-U{display:inline-flex}#m-U,#m-R{display:none}}
</style></head><body>
<div class="status-bar"><span id="sL">Lines: 1</span><span id="sC">Chars: 0</span><span id="sNS">No spaces: 0</span></div>
<div class="toolbar" id="tB">
    <div class="toolbar-group g-multi"><button class="btn-main" id="bTL">⇤</button><div class="group-label">Tab</div><button class="btn-main" id="bTR">⇥</button></div>
    <div class="toolbar-group g-single"><button class="btn-main" id="bSA">All</button></div>
    <div class="toolbar-group g-single" style="max-width:110px;"><button class="btn-main" id="bS">💾 Save as...</button></div>
    <div class="toolbar-group g-single" id="p-O"><button class="btn-main" id="bAO">Open</button></div>
    <div class="toolbar-group g-multi" id="p-U"><button class="btn-main" id="bU">↤ Un</button><div class="group-divider"></div><button class="btn-main" id="bR">Re ↦</button></div>
    <div class="menu-container"><button class="btn-menu" id="b3">⋮</button><div class="dropdown-menu" id="dM">
        <div class="menu-item" id="m-O">Open...</div><div class="menu-item" id="m-U">Undo</div><div class="menu-item" id="m-R">Redo</div><div class="menu-item" id="m-ZI">Zoom +</div><div class="menu-item" id="m-ZO">Zoom -</div>
        <label class="menu-item"><input type="checkbox" id="cW" checked style="margin-right:8px"> Word Wrap</label><label class="menu-item"><input type="checkbox" id="cM" style="margin-right:8px"> Monospace</label>
    </div></div>
</div>
<div class="container"><textarea id="ed" class="word-wrap" placeholder="Type here..."></textarea></div>
<script>
const ed=document.getElementById("ed"),sL=document.getElementById("sL"),sC=document.getElementById("sC"),sNS=document.getElementById("sNS"),dM=document.getElementById("dM"),b3=document.getElementById("b3"),cW=document.getElementById("cW"),cM=document.getElementById("cM");
let z=16,uSt=[""],rSt=[],isUR=!1;
function up(){const v=ed.value;sL.textContent="Lines: "+(v===""?1:v.split("\n").length);sC.textContent="Chars: "+v.length;sNS.textContent="No spaces: "+v.replace(/\s/g,"").length}
function sv(){if(!isUR&&uSt[uSt.length-1]!==ed.value){uSt.push(ed.value);if(uSt.length>50)uSt.shift();rSt=[]}localStorage.setItem("pad_txt",ed.value)}
function cMMenu(){dM.classList.remove("show")}
function appSt(){ed.className=cW.checked?"word-wrap":"no-wrap";if(cM.checked)ed.classList.add("monospace");ed.style.fontSize=z+"px"}

window.onload=()=>{
    // Ссылка на готовую иконку блокнота из интернета
    const mf={"name":"Newpad","short_name":"Newpad","start_url":".","display":"standalone","background_color":"#121212","theme_color":"#1e1e1e","icons":[{"src":"https://flaticon.com","sizes":"512x512","type":"image/png"}]};
    const link=document.createElement('link');link.rel='manifest';link.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(mf));document.head.appendChild(link);
    
    if('serviceWorker' in navigator){
        const swCode=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response('Offline'))));`;
        const blob=new Blob([swCode],{type:'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }

    if(localStorage.getItem("pad_txt")!==null)ed.value=localStorage.getItem("pad_txt");
    if(localStorage.getItem("pad_z")!==null)z=parseInt(localStorage.getItem("pad_z"),10);
    if(localStorage.getItem("pad_cw")!==null)cW.checked=localStorage.getItem("pad_cw")==="true";
    if(localStorage.getItem("pad_cm")!==null)cM.checked=localStorage.getItem("pad_cm")==="true";
    appSt();up();uSt=[ed.value];
};

ed.addEventListener("input",()=>{up();sv()});ed.addEventListener("keyup",up);ed.addEventListener("click",up);
b3.addEventListener("click",e=>{e.stopPropagation();dM.classList.toggle("show")});
document.addEventListener("click",e=>{if(!dM.contains(e.target)&&e.target!==b3)cMMenu()});

function executeSaveAs(){
    cMMenu();let fName = prompt("Enter file name with extension:", "document.txt");
    if(fName === null || fName.trim() === "") return;
    const b = new Blob([ed.value], { type: "text/plain;charset=utf-8" }), l = document.createElement("a");
    l.href = URL.createObjectURL(b); l.download = fName.trim(); l.click();
}
document.getElementById("bS").addEventListener("click", executeSaveAs);

function doU(fromMenu){if(uSt.length>1){isUR=!0;rSt.push(uSt.pop());ed.value=uSt[uSt.length-1];ed.focus();up();localStorage.setItem("pad_txt",ed.value);isUR=!1}if(!fromMenu)cMMenu()}
function doR(){if(rSt.length>0){isUR=!0;const v=rSt.pop();uSt.push(v);ed.value=v;ed.focus();up();localStorage.setItem("pad_txt",ed.value);isUR=!1}if(!fromMenu)cMMenu()}
document.getElementById("bU").onclick=()=>doU(false);document.getElementById("m-U").onclick=()=>doU(true);
document.getElementById("bR").onclick=()=>doR(false);document.getElementById("m-R").onclick=()=>doR(true);
document.getElementById("bSA").onclick=()=>{ed.select();ed.focus();up()};
document.getElementById("bTR").onclick=()=>{const s=ed.selectionStart,t=ed.value,i=t.lastIndexOf("\n",s-1)+1;ed.value=t.substring(0,i)+"\t"+t.substring(i);ed.selectionStart=ed.selectionEnd=s+1;ed.focus();up();sv()};
document.getElementById("bTL").onclick=()=>{const s=ed.selectionStart,t=ed.value,i=t.lastIndexOf("\n",s-1)+1;if(t.charAt(i)==="\t"){ed.value=t.substring(0,i)+t.substring(i+1);ed.selectionStart=ed.selectionEnd=Math.max(i,s-1)}ed.focus();up();sv()};

function trO(){cMMenu();const i=document.createElement("input");i.type="file";i.accept=".txt,.html,.css,.js,.json";i.onchange=e=>{const f=e.target.files,[n]=f,r=new FileReader();r.onload=ev=>{ed.value=ev.target.result;up();sv()};r.readAsText(n,"UTF-8")};i.click()}
document.getElementById("m-O").onclick=trO;document.getElementById("bAO").onclick=trO;
function zI(){z+=2;ed.style.fontSize=z+"px";localStorage.setItem("pad_z",z)}function zO(){z=Math.max(10,z-2);ed.style.fontSize=z+"px";localStorage.setItem("pad_z",z)}
document.getElementById("m-ZI").onclick=zI;document.getElementById("m-ZO").onclick=zO;
cW.onchange=e=>{localStorage.setItem("pad_cw",e.target.checked);appSt()};cM.onchange=e=>{localStorage.setItem("pad_cm",e.target.checked);appSt()};

ed.addEventListener("keydown",e=>{if(e.key==="Enter"){const p=ed.selectionStart,t=ed.value,i=t.lastIndexOf("\n",p-1)+1,l=t.substring(i,p);if(l.indexOf("- ")===0){e.preventDefault();if(l==="- "){ed.value=t.substring(0,i)+t.substring(p);ed.selectionStart=ed.selectionEnd=i}else{ed.value=t.substring(0,p)+"\n- "+t.substring(p);ed.selectionStart=ed.selectionEnd=p+3}up();sv()}else if(l.indexOf(". ")>0){const nS=l.substring(0,l.indexOf(". ")),n=parseInt(nS,10);if(!isNaN(n)&&nS===String(n)){e.preventDefault();if(l===nS+". "){ed.value=t.substring(0,i)+t.substring(p);ed.selectionStart=ed.selectionEnd=i}else{const s="\n"+(n+1)+". ";ed.value=t.substring(0,p)+s+t.substring(p);ed.selectionStart=ed.selectionEnd=p+s.length}up();sv()}}}});
</script></body></html>
