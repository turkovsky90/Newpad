<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"><title>Newpad</title>
<link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIk5ld3BhZCIsCiAgInNob3J0X25hbWUiOiAiTmV3cGFkIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMxZTFlMWUiLAogICJ0aGVtZV9jb2xvciI6ICIjMWUxZTFlIiwiaWNvbnMiOiBbeyAic3JjIjogImljb24uc3ZnIiwgInR5cGUiOiAiaW1hZ2Uvc3ZnK3htbCIsICJzaXplcyI6ICI1MTJ4NTEyIiB9XQp9Cg==">
<style>
:root{--bg:#121212;--pn:#1e1e1e;--tx:#e0e0e0;--bd:#333;--ac:#2a2a2a}*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;position:fixed;top:0;left:0;background:var(--bg);font-family:sans-serif}
/* Сетка body: текст слева (1fr), панель справа (60px) */
body{display:grid;grid-template-columns:1fr 60px;grid-template-rows:1fr;height:100vh;height:100dvh}
.container{width:100%;height:100%;overflow:hidden;position:relative}
textarea{width:100%;height:100%;background:var(--bg);color:var(--tx);border:none;padding:14px;resize:none;outline:0;font-size:16px;line-height:1.5;overflow-y:auto;overscroll-behavior:contain;cursor:text}
/* Вертикальная правая панель с центрированием кнопок */
.right-panel{background:var(--pn);border-left:1px solid var(--bd);height:100%;width:60px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:8px;padding:8px 4px;position:relative}
.toolbar-group{display:flex;flex-direction:column;align-items:center;width:100%;background:var(--ac);border:1px solid var(--bd);border-radius:6px;overflow:hidden}
.g-single{height:50px}.g-multi{height:90px}
.btn-main{background:0 0;color:var(--tx);border:none;width:100%;flex:1;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;min-height:0}
.btn-main:active{background:#444}.group-divider{border-top:1px solid var(--bd);width:100%}.group-label{font-size:10px;color:#888;padding:2px 0;text-transform:uppercase;background:#222;width:100%;text-align:center;user-select:none}
.menu-container{position:relative;width:100%}.btn-menu{background:var(--ac);color:var(--tx);border:1px solid var(--bd);width:100%;height:42px;display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:6px;cursor:pointer}
/* Выпадашка открывается влево от боковой панели */
.dropdown-menu{display:none;position:absolute;bottom:0;right:52px;background:#1a1a1a;border:1px solid var(--bd);border-radius:6px;min-width:180px;z-index:99999;padding:4px 0;box-shadow:-6px 6px 16px rgba(0,0,0,.6)}
.dropdown-menu.show{display:block!important}.menu-item{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:15px;border-bottom:1px solid #252525;color:var(--tx);user-select:none}.menu-item:last-child{border-bottom:none}
/* Компактный вертикальный счетчик в самом низу панели */
.status-bar{position:absolute;top:8px;left:8;right:0;display:flex;flex-direction:column;align-items:left;font-size:11px;color:#666;gap:2px;text-align:left;user-select:none;line-height:1}
#p-O,#p-U{display:none}@media(min-height:450px){#p-O{display:inline-flex}#m-O{display:none}}@media(min-height:600px){#p-U{display:inline-flex}#m-U,#m-R{display:none}}
</style></head><body>
<div class="container"><textarea id="ed" class="word-wrap" placeholder="Type here..."></textarea></div>
<div class="right-panel">
    <div class="toolbar-group g-multi"><button class="btn-main" id="bTL">⇤</button><div class="group-label">Tab</div><button class="btn-main" id="bTR">⇥</button></div>
    <div class="toolbar-group g-single"><button class="btn-main" id="bSA">All</button></div>
    <div class="toolbar-group g-single"><button class="btn-main" id="bS">💾</button></div>
    <div class="toolbar-group g-single" id="p-O"><button class="btn-main" id="bAO">Open</button></div>
    <div class="toolbar-group g-multi" id="p-U"><button class="btn-main" id="bU">↺</button><div class="group-divider"></div><button class="btn-main" id="bR">↻</button></div>
    <div class="menu-container"><button class="btn-menu" id="b3">⋮</button><div class="dropdown-menu" id="dM">
        <div class="menu-item" id="m-O">Open...</div><div class="menu-item" id="m-U">Undo</div><div class="menu-item" id="m-R">Redo</div><div class="menu-item" id="m-ZI">Zoom +</div><div class="menu-item" id="m-ZO">Zoom -</div>
        <label class="menu-item"><input type="checkbox" id="cW" checked style="margin-right:8px"> Word Wrap</label>
    </div></div>
    <div class="status-bar"><span id="sL">L:1</span><span id="sC">C:0</span><span id="sNS">N:0</span></div>
</div>
<script>
const ed=document.getElementById("ed"),sL=document.getElementById("sL"),sC=document.getElementById("sC"),sNS=document.getElementById("sNS"),dM=document.getElementById("dM"),b3=document.getElementById("b3"),cW=document.getElementById("cW");
let z=16,uSt=[""],rSt=[],isUR=!1,curFileName="index.html";
function up(){const v=ed.value;sL.textContent="L:"+(v===""?1:v.split("\n").length);sC.textContent="C:"+v.length;sNS.textContent="N:"+v.replace(/\s/g,"").length}
function sv(){if(!isUR&&uSt[uSt.length-1]!==ed.value){uSt.push(ed.value);if(uSt.length>50)uSt.shift();rSt=[]}localStorage.setItem("pad_txt",ed.value)}
function cMMenu(){dM.classList.remove("show")}
function appSt(){ed.className=cW.checked?"word-wrap":"no-wrap";ed.style.fontSize=z+"px"}
window.onload=()=>{
    if('serviceWorker' in navigator){
        const swCode=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request)));`;
        const blob=new Blob([swCode],{type:'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err=>console.log(err));
    }
    if(localStorage.getItem("pad_txt")!==null)ed.value=localStorage.getItem("pad_txt");
    if(localStorage.getItem("pad_z")!==null)z=parseInt(localStorage.getItem("pad_z"),10);
    if(localStorage.getItem("pad_cw")!==null)cW.checked=localStorage.getItem("pad_cw")==="true";
    if(localStorage.getItem("pad_fname")!==null)curFileName=localStorage.getItem("pad_fname");
    appSt();up();uSt=[ed.value];
};
ed.addEventListener("input",()=>{up();sv()});ed.addEventListener("keyup",up);ed.addEventListener("click",up);
b3.addEventListener("click",e=>{e.stopPropagation();dM.classList.toggle("show")});
document.addEventListener("click",e=>{if(!dM.contains(e.target)&&e.target!==b3)cMMenu()});
function executeSaveAs(){cMMenu();let fName=prompt("Enter file name with extension:",curFileName);if(fName===null||fName.trim()==="")return;curFileName=fName.trim();localStorage.setItem("pad_fname",curFileName);const b=new Blob([ed.value],{type:"text/plain;charset=utf-8"}),l=document.createElement("a");l.href=URL.createObjectURL(b);l.download=curFileName;l.click()}
document.getElementById("bS").addEventListener("click",executeSaveAs);
function doU(f){if(uSt.length>1){isUR=!0;rSt.push(uSt.pop());ed.value=uSt[uSt.length-1];ed.focus();up();localStorage.setItem("pad_txt",ed.value);isUR=!1}if(!f)cMMenu()}
function doR(f){if(rSt.length>0){isUR=!0;const v=rSt.pop();uSt.push(v);ed.value=v;ed.focus();up();localStorage.setItem("pad_txt",ed.value);isUR=!1}if(!f)cMMenu()}
document.getElementById("bU").onclick=()=>doU(!1);document.getElementById("m-U").onclick=()=>doU(!0);
document.getElementById("bR").onclick=()=>doR(!1);document.getElementById("m-R").onclick=()=>doR(!0);
document.getElementById("bSA").onclick=()=>{ed.select();ed.focus();up()};
document.getElementById("bTR").onclick=()=>{const s=ed.selectionStart,t=ed.value,i=t.lastIndexOf("\n",s-1)+1;ed.value=t.substring(0,i)+"\t"+t.substring(i);ed.selectionStart=ed.selectionEnd=s+1;ed.focus();up();sv()};
document.getElementById("bTL").onclick=()=>{const s=ed.selectionStart,t=ed.value,i=t.lastIndexOf("\n",s-1)+1;if(t.charAt(i)==="\t"){ed.value=t.substring(0,i)+t.substring(i+1);ed.selectionStart=ed.selectionEnd=Math.max(i,s-1)}ed.focus();up();sv()};
function trO(){cMMenu();const i=document.createElement("input");i.type="file";i.accept=".txt,.html,.css,.js,.json";i.onchange=e=>{const f=e.target.files,[n]=f,r=new FileReader();r.onload=ev=>{ed.value=ev.target.result;curFileName=n.name;localStorage.setItem("pad_fname",curFileName);up();sv()};r.readAsText(n,"UTF-8")};i.click()}
document.getElementById("m-O").onclick=trO;document.getElementById("bAO").onclick=trO;
function zI(){z+=2;ed.style.fontSize=z+"px";localStorage.setItem("pad_z",z)}function zO(){z=Math.max(10,z-2);ed.style.fontSize=z+"px";localStorage.setItem("pad_z",z)}
document.getElementById("m-ZI").onclick=zI;document.getElementById("m-ZO").onclick=zO;
cW.onchange=e=>{localStorage.setItem("pad_cw",e.target.checked);appSt()};
ed.addEventListener("keydown",e=>{if(e.key==="Enter"){const p=ed.selectionStart,t=ed.value,i=t.lastIndexOf("\n",p-1)+1,l=t.substring(i,p);const clean=l.trim();if(clean.indexOf("- ")===0){e.preventDefault();if(clean==="- "){ed.value=t.substring(0,i)+t.substring(p);ed.selectionStart=ed.selectionEnd=i}else{const indent=l.substring(0,l.indexOf("- "));ed.value=t.substring(0,p)+"\n"+indent+"- "+t.substring(p);ed.selectionStart=ed.selectionEnd=p+1+indent.length+2}up();sv()}else{const d=clean.indexOf(". ");if(d>0){const nS=clean.substring(0,d),n=parseInt(nS,10);if(!isNaN(n)&&nS===String(n)){e.preventDefault();if(clean===nS+". "){ed.value=t.substring(0,i)+t.substring(p);ed.selectionStart=ed.selectionEnd=i}else{const indent=l.substring(0,l.indexOf(nS+". "));const s="\n"+indent+(n+1)+". ";ed.value=t.substring(0,p)+s+t.substring(p);ed.selectionStart=ed.selectionEnd=p+s.length}up();sv()}}}}});
</script></body></html>
