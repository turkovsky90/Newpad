<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"><title>Newpad</title>
<link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIk5ld3BhZCIsCiAgInNob3J0X25hbWUiOiAiTmV3cGFkIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMxZTFlMWUiLAogICJ0aGVtZV9jb2xvciI6ICIjMWUxZTFlIiwiaWNvbnMiOiBbeyAic3JjIjogImljb24uc3ZnIiwgInR5cGUiOiAiaW1hZ2Uvc3ZnK3htbCIsICJzaXplcyI6ICI1MTJ4NTEyIiB9XQp9Cg==">
<style>
:root{--bg:#121212;--pn:#1e1e1e;--tx:#e0e0e0;--bd:#333;--ac:#2a2a2a;--hover:#3a3a3a}*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;margin:0;padding:0;background:var(--bg);font-family:sans-serif}
body{display:flex;flex-direction:row;height:100dvh}
.container{flex:1;min-width:0;height:100%;overflow:hidden}
textarea{width:100%;height:100%;background:var(--bg);color:var(--tx);border:none;padding:14px;resize:none;outline:0;font-size:16px;line-height:1.5;overflow-y:auto;overscroll-behavior:contain;cursor:text}
.right-panel {
  background: var(--pn);
  border-left: 1px solid var(--bd);
  width: 64px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 10px;
  padding: 10px 6px;
  position: relative;
  flex-shrink: 0;
}
.toolbar-group{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:var(--ac); border:1px solid var(--bd); border-radius:8px; overflow:hidden;
  width: 100%; flex-shrink:0;
}
.g-tab{ height: 110px; }
.g-actions{ height: 156px; }
.g-single{ height: 56px; }
.g-save{ 
  height: 56px;
  background:#0b3d5c; 
  border-color:#0b3d5c; 
}
.g-save .btn-main{ color:white; font-weight:bold; font-size:14px; }
.g-save:hover{ background:#0e4d70; border-color:#0e4d70; }
.btn-main{
  background:0 0; color:var(--tx); border:none; width:100%; flex:1;
  cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center;
  min-height:0; transition: background 0.15s;
}
.btn-main:hover{ background:var(--hover) }
.btn-main:active{background:#555}
.group-divider{border-top:1px solid var(--bd); width:100%}
.menu-container{position:relative; width:100%; flex-shrink:0}
.btn-menu{
  background:var(--ac); color:var(--tx); border:1px solid var(--bd);
  width:100%; height:50px; display:flex; align-items:center; justify-content:center;
  font-size:22px; border-radius:8px; cursor:pointer; transition: background 0.15s;
}
.btn-menu:hover{ background:var(--hover) }
.dropdown-menu{
  display:none; position:fixed; background:#1a1a1a; border:1px solid var(--bd);
  border-radius:8px; min-width:190px; z-index:2000; padding:4px 0;
  box-shadow:-6px 6px 16px rgba(0,0,0,.6);
}
.dropdown-menu.show{display:block!important}
.menu-item{
  padding:16px 18px; display:flex; align-items:center; gap:10px; cursor:pointer;
  font-size:16px; border-bottom:1px solid #252525; color:var(--tx); user-select:none; transition: background 0.15s;
}
.menu-item:hover{ background:var(--hover) }
.menu-item:last-child{border-bottom:none}
.status-bar {
  position: absolute;
  bottom: 8px;
  left: 8px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  font-size: 10px;
  color: #666;
  gap: 2px;
  text-align: left;
  user-select: none;
  line-height: 1;
}
.desktop-only { display: none; }
.mobile-only { display: flex; }
@media (min-width: 601px) {
  .desktop-only { display: flex; }
  .mobile-only { display: none; }
}
.word-wrap { white-space: pre-wrap; word-wrap: break-word; }
.no-wrap { white-space: pre; }
</style></head><body>
<div class="container"><textarea id="ed" class="word-wrap" placeholder="Type here..."></textarea></div>
<div class="right-panel">
    <div class="toolbar-group g-tab" id="gTab"><button class="btn-main" id="bTL">⇤</button><div class="group-divider"></div><button class="btn-main" id="bTR">⇥</button></div>
    <div class="toolbar-group g-actions desktop-only" id="gActions">
      <button class="btn-main" id="bU">↶</button>
      <div class="group-divider"></div>
      <button class="btn-main" id="bR">↷</button>
      <div class="group-divider"></div>
      <button class="btn-main" id="bAO">Open</button>
    </div>
    <div class="toolbar-group g-single"><button class="btn-main" id="bSA">𝙸 All</button></div>
    <div class="toolbar-group g-save"><button class="btn-main" id="bS">Save</button></div>
    <div class="menu-container"><button class="btn-menu" id="b3">⋮</button></div>
    <div class="status-bar"><span id="sL">L:1</span><span id="sC">C:0</span><span id="sNS">N:0</span></div>
</div>
<div class="dropdown-menu" id="dM">
    <div class="menu-item mobile-only" id="m-Open">Open...</div>
    <div class="menu-item mobile-only" id="m-U">↶ Undo</div>
    <div class="menu-item mobile-only" id="m-R">↷ Redo</div>
    <div class="menu-item" id="m-ZI">Zoom +</div>
    <div class="menu-item" id="m-ZO">Zoom -</div>
    <label class="menu-item"><input type="checkbox" id="cW" checked style="margin-right:8px"> Word Wrap</label>
</div>
<script>
const ed=document.getElementById("ed"),sL=document.getElementById("sL"),sC=document.getElementById("sC"),sNS=document.getElementById("sNS"),dM=document.getElementById("dM"),b3=document.getElementById("b3"),cW=document.getElementById("cW");

let z=16,uSt=[""],rSt=[],isUR=!1,curFileName="index.html";

function scrollToCursor() { ed.focus(); }
function up(){const v=ed.value;sL.textContent="L:"+(v===""?1:v.split("\n").length);sC.textContent="C:"+v.length;sNS.textContent="N:"+v.replace(/\s/g,"").length}
function sv(){if(!isUR&&uSt[uSt.length-1]!==ed.value){uSt.push(ed.value);if(uSt.length>50)uSt.shift();rSt=[]}localStorage.setItem("pad_txt",ed.value)}
function cMMenu(){dM.classList.remove("show")}
function appSt(){ed.className=cW.checked?"word-wrap":"no-wrap";ed.style.fontSize=z+"px"}

window.onload=()=>{
    if('serviceWorker' in navigator){
        const swCode=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request)));`;
        const blob=new Blob([swCode],{type:'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err=>console.log(err));
    }
    if(localStorage.getItem("pad_txt")!==null)ed.value=localStorage.getItem("pad_txt");
    if(localStorage.getItem("pad_z")!==null)z=parseInt(localStorage.getItem("pad_z"),10);
    if(localStorage.getItem("pad_cw")!==null)cW.checked=localStorage.getItem("pad_cw")==="true";
    if(localStorage.getItem("pad_fname")!==null)curFileName=localStorage.getItem("pad_fname");
    appSt();up();uSt=[ed.value];
};

ed.addEventListener("input",()=>{up();sv();scrollToCursor()});
ed.addEventListener("keyup",()=>{up();scrollToCursor()});
ed.addEventListener("click",up);

b3.addEventListener("click",e=>{
    e.stopPropagation();
    dM.classList.toggle("show");
    if (dM.classList.contains("show")) {
        dM.style.visibility = 'hidden';
        dM.style.display = 'block';
        const menuWidth = dM.offsetWidth;
        const menuHeight = dM.offsetHeight;
        dM.style.display = '';
        dM.style.visibility = '';
        const btnRect = b3.getBoundingClientRect();
        let left = btnRect.left - menuWidth - 8;
        if (left < 8) left = 8;
        let top = btnRect.bottom - menuHeight;
        if (top < 8) top = 8;
        dM.style.top = top + 'px';
        dM.style.left = left + 'px';
    }
});
document.addEventListener("click",e=>{if(!dM.contains(e.target)&&e.target!==b3)cMMenu()});

function executeSaveAs(){cMMenu();let fName=prompt("Enter file name with extension:",curFileName);if(fName===null||fName.trim()==="")return;curFileName=fName.trim();localStorage.setItem("pad_fname",curFileName);const b=new Blob([ed.value],{type:"text/plain;charset=utf-8"}),l=document.createElement("a");l.href=URL.createObjectURL(b);l.download=curFileName;l.click()}
document.getElementById("bS").addEventListener("click",executeSaveAs);

function doU(keepMenuOpen){if(uSt.length>1){isUR=!0;rSt.push(uSt.pop());ed.value=uSt[uSt.length-1];ed.focus();up();scrollToCursor();localStorage.setItem("pad_txt",ed.value);isUR=!1}if(!keepMenuOpen)cMMenu()}
function doR(keepMenuOpen){if(rSt.length>0){isUR=!0;const v=rSt.pop();uSt.push(v);ed.value=v;ed.focus();up();scrollToCursor();localStorage.setItem("pad_txt",ed.value);isUR=!1}if(!keepMenuOpen)cMMenu()}

document.getElementById("bU").onclick=()=>doU(false);
document.getElementById("bR").onclick=()=>doR(false);
document.getElementById("m-U").onclick=()=>doU(true);
document.getElementById("m-R").onclick=()=>doR(true);

document.getElementById("bSA").onclick=()=>{ed.select();ed.focus();up()};
document.getElementById("bTR").onclick=()=>{const s=ed.selectionStart,t=ed.value,i=t.lastIndexOf("\n",s-1)+1;ed.value=t.substring(0,i)+"\t"+t.substring(i);ed.selectionStart=ed.selectionEnd=s+1;ed.focus();up();scrollToCursor();sv()};
document.getElementById("bTL").onclick=()=>{const s=ed.selectionStart,t=ed.value,i=t.lastIndexOf("\n",s-1)+1;if(t.charAt(i)==="\t"){ed.value=t.substring(0,i)+t.substring(i+1);ed.selectionStart=ed.selectionEnd=Math.max(i,s-1)}ed.focus();up();scrollToCursor();sv()};

function trO(){cMMenu();const i=document.createElement("input");i.type="file";i.accept=".txt,.html,.css,.js,.json";i.onchange=e=>{const f=e.target.files,[n]=f,r=new FileReader();r.onload=ev=>{ed.value=ev.target.result;curFileName=n.name;localStorage.setItem("pad_fname",curFileName);up();sv()};r.readAsText(n,"UTF-8")};i.click()}
document.getElementById("bAO").onclick=trO;
document.getElementById("m-Open").onclick=()=>{ trO(); cMMenu(); };

function zI(){z+=2;ed.style.fontSize=z+"px";localStorage.setItem("pad_z",z)}
function zO(){z=Math.max(10,z-2);ed.style.fontSize=z+"px";localStorage.setItem("pad_z",z)}
document.getElementById("m-ZI").onclick=zI;
document.getElementById("m-ZO").onclick=zO;
cW.onchange=e=>{localStorage.setItem("pad_cw",e.target.checked);appSt()};

function getNextChar(c) {
    if (c >= 'a' && c < 'z') return String.fromCharCode(c.charCodeAt(0)+1);
    if (c === 'z') return 'a';
    if (c >= 'A' && c < 'Z') return String.fromCharCode(c.charCodeAt(0)+1);
    if (c === 'Z') return 'A';
    if (c >= 'а' && c < 'я') return String.fromCharCode(c.charCodeAt(0)+1);
    if (c === 'я') return 'а';
    if (c >= 'А' && c < 'Я') return String.fromCharCode(c.charCodeAt(0)+1);
    if (c === 'Я') return 'А';
    return null;
}

ed.addEventListener("keydown",e=>{
    if(e.key==="Enter"){
        const p=ed.selectionStart, t=ed.value, i=t.lastIndexOf("\n",p-1)+1, l=t.substring(i,p);
        const clean = l.trimStart();
        const leading = l.substring(0, l.length - clean.length);
        
        if(!clean) {
            e.preventDefault();
            ed.value = t.substring(0,p) + "\n" + l + t.substring(p);
            ed.selectionStart = ed.selectionEnd = p + 1 + l.length;
            up();sv();scrollToCursor();
            return;
        }
        
        if(clean.startsWith("- ")){
            e.preventDefault();
            if(clean==="- "){
                ed.value=t.substring(0,i)+t.substring(p);
                ed.selectionStart=ed.selectionEnd=i;
            }else{
                const indent = l.substring(0,l.indexOf("- "));
                ed.value=t.substring(0,p)+"\n"+indent+"- "+t.substring(p);
                ed.selectionStart=ed.selectionEnd=p+1+indent.length+2;
            }
            up();sv();scrollToCursor();
            return;
        }
        
        const numMatch = clean.match(/^(\d+)\.\s/);
        if(numMatch){
            e.preventDefault();
            const num = parseInt(numMatch[1],10);
            if(clean === numMatch[0]){
                ed.value=t.substring(0,i)+t.substring(p);
                ed.selectionStart=ed.selectionEnd=i;
            }else{
                const indent = l.substring(0,l.indexOf(numMatch[0]));
                const next = (num+1)+". ";
                ed.value=t.substring(0,p)+"\n"+indent+next+t.substring(p);
                ed.selectionStart=ed.selectionEnd=p+indent.length+next.length+1;
            }
            up();sv();scrollToCursor();
            return;
        }
        
        const letterMatch = clean.match(/^([a-zA-Zа-яА-ЯёЁ])\.\s/);
        if(letterMatch){
            e.preventDefault();
            const letter = letterMatch[1];
            if(clean === letterMatch[0]){
                ed.value=t.substring(0,i)+t.substring(p);
                ed.selectionStart=ed.selectionEnd=i;
            }else{
                const nextChar = getNextChar(letter);
                if(nextChar){
                    const indent = l.substring(0,l.indexOf(letterMatch[0]));
                    const next = nextChar+". ";
                    ed.value=t.substring(0,p)+"\n"+indent+next+t.substring(p);
                    ed.selectionStart=ed.selectionEnd=p+indent.length+next.length+1;
                }
            }
            up();sv();scrollToCursor();
            return;
        }
        
        e.preventDefault();
        ed.value = t.substring(0,p) + "\n" + leading + t.substring(p);
        ed.selectionStart = ed.selectionEnd = p + 1 + leading.length;
        up();sv();scrollToCursor();
    }
});
</script></body></html>
